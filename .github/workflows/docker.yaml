name: Docker Build

on:
  push:
    branches:
      - master
      - develop
    tags:
      - 'v*.*.*'
  pull_request:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - variant: backend
            dockerfile: etc/docker/Dockerfile
          - variant: backend-multistage
            dockerfile: etc/docker/Dockerfile.multistage
          - variant: backend-distroless
            dockerfile: etc/docker/Dockerfile.distroless
          - variant: backend-chainguard
            dockerfile: etc/docker/Dockerfile.chainguard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set TAG
        id: vars
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "master" ]]; then
            echo "TAG=latest" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            echo "TAG=dev" >> $GITHUB_OUTPUT
          else
            echo "TAG=pr" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/fastapi-realworld-example:${{ matrix.variant }}-${{ steps.vars.outputs.TAG }}
