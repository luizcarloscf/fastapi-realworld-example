networks:
  conduit-network:
    driver: bridge

services:
  backend:
    image: luizcarloscf/conduit-backend:v0.1.0
    build:
      context: .
      dockerfile: ./etc/docker/Dockerfile
    container_name: backend
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      OTLP_GRPC_ENDPOINT: http://otel-collector:4317
    ports:
      - "8000:8000"
    networks:
      - conduit-network
    depends_on:
      - postgres
      - otel-collector
  postgres:
    image: postgres
    container_name: postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DATABASE_NAME:?DATABASE_NAME is required}
      POSTGRES_USER: ${DATABASE_USER:?DATABASE_USER is required}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
    ports:
      - "5432:5432"
    networks:
      - conduit-network
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: jaeger
    command:
      - "--memory.max-traces=5000"
      - "--query.base-path=/jaeger/ui"
      - "--prometheus.server-url=http://prometheus:9090"
      - "--prometheus.query.normalize-calls=true"
      - "--prometheus.query.normalize-duration=true"
    ports:
      - "16686:16686"   # http-query
      - "16685:16685"   # grpc-query
    environment:
      - METRICS_STORAGE_TYPE=prometheus
      - SPAN_STORAGE_TYPE=memory
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - JAEGER_DISABLED=false
    networks:
      - conduit-network
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: [ "--config=/etc/otel-collector.yml" ]
    volumes:
      - ./etc/shared/otel-collector.yml:/etc/otel-collector.yml
    ports:
      - "8888:8888"   # Prometheus metrics exposed by the collector
      - "13133:13133" # health_check extension
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP http receiver
    networks:
      - conduit-network
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - --storage.tsdb.retention.time=1d
      - --config.file=/etc/prometheus.yml
      - --enable-feature=exemplar-storage
      - --web.enable-otlp-receiver
    volumes:
      - ./etc/shared/prometheus.yml:/etc/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - conduit-network
  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: opensearch
    environment:
      - cluster.name=demo-cluster
      - node.name=demo-node
      - bootstrap.memory_lock=true
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms300m -Xmx300m
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
    ports:
      - "9200:9200"
    networks:
      - conduit-network
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - ./etc/shared/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_INSTALL_PLUGINS=grafana-opensearch-datasource
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor traceQLStreaming metricsSummary
    ports:
      - "3000:3000"
    networks:
      - conduit-network
